name: CI
on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - prod

jobs:
  build_docker:
    runs-on: ubuntu-latest

    steps:
      - name: install checkout
        uses: actions/checkout@v7

      - name: check version docker
        run: |
          docker -v
          docker compose version

      - name: docker up
        run: docker compose up -d

      - name: install dependencies
        run: docker compose exec -T -w /front/front node npm ci

      #- name: run test
      #  run: docker compose exec -T -w /front/front node npm test -- --ci --passWithNoTests

      - name: build app
        run: docker compose exec -T -w /front/front npm run build

      - name: stop docker
        if: always()
        run: docker compose down


