name: CI
on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - prod

jobs:
  build_docker:
    runs-on: ubuntu-latest

    steps:
      - name: install checkout
        uses: actions/checkout@v7

      - name: check version docker
        run: |
          docker -v
          docker compose version

      - name: docker up
        run: docker compose up