name: CI
on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - prod
    branches-ignore:
      - staging

jobs:
  build_docker:
    runs-on: ubuntu-latest

    steps:
      - name: install checkout
        uses: actions/checkout@v7

      - name: check version docker
        run: |
          docker -v
          docker compose version